<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Florenza Deodorant - Checkout</title>
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID&currency=USD"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fafafa; display: flex; justify-content: center; padding-top: 50px; }
        .checkout-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 10px; color: #555; }
        .total-row { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="checkout-card">
        <h2>Order Summary</h2>
        <div class="price-row">
            <span>Florenza Lavender</span>
            <span>450.00 DH</span>
        </div>
        <div class="price-row">
            <span>Shipping Fee</span>
            <span>50.00 DH</span>
        </div>
        <div class="total-row">
            <span>Total</span>
            <span>500.00 DH</span>
        </div>

        <div id="paypal-button-container"></div>
    </div>

    <script>
        const BACKEND_URL = window.location.origin;

        // Current item for sale (In a cart.html, this would come from LocalStorage)
        const myCart = [
            { name: "Florenza Lavender Deodorant", quantity: 1, price: "450.00" }
        ];

        paypal.Buttons({
            createOrder: async () => {
                const response = await fetch(`${BACKEND_URL}/api/orders`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ cart: myCart })
                });
                const order = await response.json();
                return order.id;
            },
            onApprove: async (data) => {
                const response = await fetch(`${BACKEND_URL}/api/orders/${data.orderID}/capture`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ cart: myCart })
                });
                const result = await response.json();
                if (result.order) {
                    alert("Order Placed Successfully!");
                    window.location.reload();
                }
            }
        }).render('#paypal-button-container');
    </script>
</body>
</html>
