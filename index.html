<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Shop - Checkout</title>
    <script src="https://www.paypal.com/sdk/js?client-id=AUXtNR_0gOjHzsUrQYQmRTZR1isdQckuSVzPqJ4ygnrHw2DBAVwou2p3OyAjfHE0AShmDVrszDzhR0l0&currency=USD"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; }
        .card { background: white; padding: 2rem; border-radius: 8px;  text-align: center; width: 350px; }
        h2 { color: #333; }
        #paypal-button-container { margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Florenza Fragrance</h2>
        <p>Total: $45.00</p>
        <div id="paypal-button-container"> </div>
    </div>

    <script>
        // CHANGE THIS TO YOUR RAILWAY BACKEND LINK
        const BACKEND_URL = window.location.origin;

        // --- NEW: Define your product here ---
        const myCart = [
            { 
                name: "Florenza Lavender Fragrance", 
                quantity: 1, 
                price: "45.00" 
            }
        ];

        paypal.Buttons({
            createOrder: async () => {
                const response = await fetch(`${BACKEND_URL}/api/orders`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    // SENDING THE CART DATA TO THE BACKEND
                    body: JSON.stringify({ cart: myCart }) 
                });
                const order = await response.json();
                return order.id; 
            },

            onApprove: async (data) => {
                const response = await fetch(`${BACKEND_URL}/api/orders/${data.orderID}/capture`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    // SENDING THE CART DATA AGAIN SO THE BACKEND CAN SAVE IT TO MONGODB
                    body: JSON.stringify({ cart: myCart }) 
                });
                
                const result = await response.json();
                
                if (result.order && (result.order.status === "COMPLETED" || result.order.status === "APPROVED")) {
                    alert("✅ Payment Successful! Order saved in MongoDB.");
                    console.log("Database Record:", result.order);
                } else {
                    alert("❌ Payment failed or was not completed.");
                }
            },

            onError: (err) => {
                console.error("PayPal Error:", err);
                alert("Something went wrong with the connection.");
            }
        }).render('#paypal-button-container');
    </script>
</body>
</html>
